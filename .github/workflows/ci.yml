name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      # Dart is a single-vendor, stable toolchain, but scripting-style
      # version drift can still bite, so we test current stable + one prior.
      fail-fast: false
      matrix:
        sdk: ["3.8", stable]
    name: build & test (Dart ${{ matrix.sdk }})
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (build — no errors allowed)
        run: dart analyze --fatal-infos

      - name: Run tests (shared vectors + streaming + malformed + truncation)
        run: dart test

      - name: Sanity-run the example and benchmarks
        run: |
          dart run example/person.dart
          dart run bench/bench.dart
          dart run bench/perf.dart

  coverage:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Collect coverage
        run: |
          dart pub global activate coverage
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib --check-ignore
      - name: Enforce >90% line coverage (CORELIB_PLAN §7.3)
        run: |
          PCT=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{printf "%.1f", (lh/lf)*100}' coverage/lcov.info)
          echo "Line coverage: ${PCT}%"
          echo "coverage=${PCT}" >> "$GITHUB_STEP_SUMMARY"
          awk "BEGIN{exit !(${PCT} > 90)}" \
            || { echo "::error::coverage ${PCT}% is not above the 90% bar"; exit 1; }
      - name: Upload coverage report (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
      # The rendered coverage badge is generated and published to GitHub Pages by
      # docs.yml (self-hosted, Codecov-equivalent per §12.1); the README badge
      # points at https://sofa-buffers.github.io/corelib-dart/coverage.svg
