name: Docs

on:
  push:
    branches: [main]

# GitHub Pages via the native Actions deployment (no gh-pages branch).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get

      - name: Generate API docs
        run: dart doc --output doc/api

      - name: Generate coverage + badge
        run: |
          dart pub global activate coverage
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib --check-ignore
          # Self-hosted coverage badge (Codecov-equivalent), served from Pages
          # at https://sofa-buffers.github.io/corelib-dart/coverage.svg
          dart run tool/gen_coverage_badge.dart coverage/lcov.info doc/api/coverage.svg

      - uses: actions/upload-pages-artifact@v5
        with:
          path: doc/api

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
